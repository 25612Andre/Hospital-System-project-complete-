# ===============================
# APPLICATION CORE CONFIG
# ===============================
spring.application.name=HospitalManagementSystem
server.port=${PORT:8899}

# ===============================
# DATABASE CONFIGURATION (PostgreSQL)
# ===============================
jwt.secret=${JWT_SECRET:default-demo-secret-please-change}
# Keep 2FA opt-in by default. Forcing it globally blocks login when email delivery is unavailable.
app.auth.enforce-2fa=${APP_AUTH_ENFORCE_2FA:false}
# Enable return code for demo purposes so user isn't locked out
app.auth.return-2fa-code=${APP_AUTH_RETURN_2FA_CODE:false}
app.demo-data.enabled=${APP_DEMO_DATA_ENABLED:true}
app.location.import-on-startup=${APP_LOCATION_IMPORT_ON_STARTUP:false}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hospital_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ap}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false
spring.sql.init.mode=never

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.ignore-migration-patterns=*:future,*:ignored

# ===============================
# MAIL CONFIGURATION
# ===============================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:apjr.nzendong@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:fxnyctrlaikoelps}
spring.mail.test-connection=${SPRING_MAIL_TEST_CONNECTION:true}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_CONNECTION_TIMEOUT:10000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_WRITE_TIMEOUT:10000}

# ===============================
# FILE GENERATION (PDF PATH)
# ===============================
hospital.billing.pdf.dir=${HOSPITAL_BILLING_PDF_DIR:./bills/}

# ===============================
# LOGGING CONFIG
# ===============================
logging.level.root=INFO
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE_SQL:INFO}
logging.file.name=${LOGGING_FILE_NAME:logs/hospital.log}

# Actuator Config
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
