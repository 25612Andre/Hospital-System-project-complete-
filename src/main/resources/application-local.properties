spring.application.name=HospitalManagementSystem
server.port=${PORT:8899}

jwt.secret=${JWT_SECRET:local-demo-secret-change-me}
app.auth.enforce-2fa=${APP_AUTH_ENFORCE_2FA:false}
app.auth.return-2fa-code=${APP_AUTH_RETURN_2FA_CODE:false}
app.demo-data.enabled=${APP_DEMO_DATA_ENABLED:true}
app.location.import-on-startup=${APP_LOCATION_IMPORT_ON_STARTUP:false}

spring.datasource.url=jdbc:h2:file:./target/local-db/hospital;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false
spring.sql.init.mode=never

spring.flyway.enabled=false

spring.mail.host=localhost
spring.mail.port=25
spring.mail.test-connection=false

hospital.billing.pdf.dir=${HOSPITAL_BILLING_PDF_DIR:./bills/}

logging.level.root=INFO
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE_SQL:INFO}
logging.file.name=${LOGGING_FILE_NAME:logs/hospital.log}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
